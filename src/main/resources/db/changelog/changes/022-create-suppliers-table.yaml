databaseChangeLog:
  - changeSet:
      id: 021-create-suppliers-table
      author: puks

      changes:
        - createTable:
            tableName: suppliers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: company_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: phone
                  type: VARCHAR(50)

              - column:
                  name: email
                  type: VARCHAR(255)

              - column:
                  name: address
                  type: VARCHAR(500)

              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: suppliers
            baseColumnNames: company_id
            referencedTableName: companies
            referencedColumnNames: id
            constraintName: fk_suppliers_companies