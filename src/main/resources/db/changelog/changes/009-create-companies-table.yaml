databaseChangeLog:
  - changeSet:
      id: 009-create-companies-table
      author: puks

      changes:
        - createTable:
            tableName: companies
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(255)

              - column:
                  name: phone
                  type: VARCHAR(50)

              - column:
                  name: address
                  type: VARCHAR(500)

              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false