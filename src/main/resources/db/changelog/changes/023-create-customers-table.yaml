databaseChangeLog:
  - changeSet:
      id: 023-create-customers-table
      author: puks

      changes:
        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: company_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: phone
                  type: VARCHAR(50)

              - column:
                  name: address
                  type: VARCHAR(500)

              - column:
                  name: discount_percentage
                  type: DECIMAL(5,2)
                  defaultValueNumeric: 0

              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: customers
            baseColumnNames: company_id
            referencedTableName: companies
            referencedColumnNames: id
            constraintName: fk_customers_companies