databaseChangeLog:
  - changeSet:
      id: 011-create-medicines-table
      author: puks

      changes:
        - createTable:
            tableName: medicines
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: company_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: generic_name
                  type: VARCHAR(255)

              - column:
                  name: price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: medicines
            baseColumnNames: company_id
            referencedTableName: companies
            referencedColumnNames: id
            constraintName: fk_medicines_companies