databaseChangeLog:
  - changeSet:
      id: 013-create-bill-items-table
      author: puks

      changes:
        - createTable:
            tableName: bill_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: bill_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: medicine_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: subtotal
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: bill_items
            baseColumnNames: bill_id
            referencedTableName: bills
            referencedColumnNames: id
            constraintName: fk_bill_items_bills

        - addForeignKeyConstraint:
            baseTableName: bill_items
            baseColumnNames: medicine_id
            referencedTableName: medicines
            referencedColumnNames: id
            constraintName: fk_bill_items_medicines