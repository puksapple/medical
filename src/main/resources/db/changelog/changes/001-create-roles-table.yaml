databaseChangeLog:
  - changeSet:
      id: 001-create-roles-table
      author: puks

      changes:
        - createTable:
            tableName: roles

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)

                  constraints:
                    nullable: false
                    unique: true