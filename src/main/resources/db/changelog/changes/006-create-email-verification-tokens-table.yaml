databaseChangeLog:
  - changeSet:
      id: 006-create-email-verification-tokens-table
      author: puks

      changes:
        - createTable:
            tableName: email_verification_tokens

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: expiry_date
                  type: DATETIME
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: email_verification_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_email_verification_tokens_users