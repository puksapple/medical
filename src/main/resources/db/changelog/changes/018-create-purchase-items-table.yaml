databaseChangeLog:
  - changeSet:
      id: 018-create-purchase-items-table
      author: puks

      changes:
        - createTable:
            tableName: purchase_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: purchase_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: medicine_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: purchase_price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: subtotal
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: batch_no
                  type: VARCHAR(100)

              - column:
                  name: expiry_date
                  type: DATE

        - addForeignKeyConstraint:
            baseTableName: purchase_items
            baseColumnNames: purchase_id
            referencedTableName: purchases
            referencedColumnNames: id
            constraintName: fk_purchase_items_purchases

        - addForeignKeyConstraint:
            baseTableName: purchase_items
            baseColumnNames: medicine_id
            referencedTableName: medicines
            referencedColumnNames: id
            constraintName: fk_purchase_items_medicines