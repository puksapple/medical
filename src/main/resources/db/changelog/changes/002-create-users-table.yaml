databaseChangeLog:
  - changeSet:
      id: 002-create-users-table
      author: puks

      changes:
        - createTable:
            tableName: users

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: full_name
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(255)

                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true

                  constraints:
                    nullable: false

              - column:
                  name: role_id
                  type: BIGINT

                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: role_id

            referencedTableName: roles
            referencedColumnNames: id

            constraintName: fk_users_roles