databaseChangeLog:
  - changeSet:
      id: 012-create-bills-table
      author: puks

      changes:
        - createTable:
            tableName: bills
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: company_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: bill_number
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: customer_name
                  type: VARCHAR(255)

              - column:
                  name: total_amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: bills
            baseColumnNames: company_id
            referencedTableName: companies
            referencedColumnNames: id
            constraintName: fk_bills_companies